

<!DOCTYPE html>
<html>

<head>

<title>E-commerce Site</title>

<style>

body {

margin: 0;

background-color: aliceblue;

font-family: sans-serif;

}


.container {

display: grid;

min-height: 100vh;

grid-template-rows: auto auto 1fr auto;

grid-template-columns: 200px 1fr;

grid-template-areas:

"header header"

"sale sale"

"sidebar products"

"footer footer";


}


.header {

grid-area: header;

background-color: blanchedalmond;

text-align: center;

padding: 10px;

margin-top: 0px;

border-radius: 8px;

}


.sale {

grid-area: sale;

background-color: rgb(52, 21, 138);

opacity: 0.9;

color: white;

border-radius: 8px;

text-align: center;

padding: 10px;

font-size: 19px;

font-weight: bold;

}


.sidebar {

grid-area: sidebar;

background-color: #e3f2fd;

padding: 20px;

border-radius: 9px;

opacity: 0.9;

border-right: 1px solid #ccc;

}

.frame {

grid-area: products;

width: 100%;

height: 100%;

border: none;

}


.sidebar a {

display: block;

color: black;

text-decoration: none;

padding: 10px 0;

border-bottom: 1px solid #d1e9ff;

}


.sidebar a:hover {

color: blue;

}


.footer {

grid-area: footer;

background-color: black;

color: white;

text-align: center;

padding: 2px;

}

</style>

</head>

<body>


<div class="container">

<div class="header">

<h1>E-commerce store</h1>

</div>


<div class="sale">

<p>BIG SALE! 50% OFF!!</p>

</div>


<div class="sidebar">

<h3>Categories</h3>

<hr>

<a href="electronics.html" target="frame">Electronics</a>

<a href="clothes.html" target="frame">Clothes</a>

<a href="accessories.html" target="frame">Accessories</a>

</div>


<iframe class="frame" name="frame" src="electronics.html"></iframe>


<footer class="footer">

<p>2026 E-commerce Store Concept</p>

</footer>

</div>


</body>

</html>
