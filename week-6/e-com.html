body{
    margin:0;
    font-family:Arial;
}
.container{
    display:grid;
    grid-template-areas:
        "header header"
        "sale sale"
        "sidebar products"
        "footer footer";
    grid-template-columns:220px 1fr;
}
header{
    grid-area:header;
    background:blue;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
}   
.sale{
    grid-area:sale;
    background:yellow;
    text-align:center;
    padding:10px;

}
.sidebar{
    grid-area:sidebar;
    background:#ddd;
    padding:20px;
}
.products{
    grid-area:products;
    padding:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;  
}
.card{
    border:1px solid #aaa;
    text-align:center;
    padding:30px;
}
.card img{ 
            height: 150px;
            object-fit: cover;
        }
.card-content {
            padding: 15px;
        }
.card button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
.card button:hover {
            background: #0056b3;
        } 
footer{
    grid-area:footer;
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}       
</style>
