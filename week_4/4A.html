<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>

<body>

    <h2 align="center">College Admission Registration</h2>

    <form>
        <table border="2" align="center" cellpadding="10" cellspacing="0">

            <tr>
                <td>Full Name:</td>
                <td><input type="text" name="fullname" size="30"></td>
            </tr>

            <tr>
                <td>Email:</td>
                <td><input type="email" name="email" size="30"></td>
            </tr>

            <tr>
                <td>Phone Number:</td>
                <td><input type="tel" name="phone" size="30"></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male"> Male
                     <input type="radio" name="gender" value="female"> Female
                    <input type="radio" name="gender" value="other"> Other
                </td>
            </tr>

            <tr>
                <td>Course Applying For:</td>
                <td>
                    <select name="course">
                        <option>B.Tech</option>
                        <option>B.Sc</option>
                        <option>B.Com</option>
                        <option>B.A</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Hobbies:</td>
                <td>
                    <input type="checkbox" name="hobby" value="sports"> Sports
                    <input type="checkbox" name="hobby" value="music"> Music
                    <input type="checkbox" name="hobby" value="reading"> Reading
                </td>
            </tr>

            <tr>
                <td>Date of Birth:</td>
                <td><input type="date" name="dob"></td>
            </tr>

            <tr>
                <td>Upload Certificates:</td>
                <td><input type="file" name="certificate"></td>
            </tr>

            <tr>
                <td>Address:</td>
                <td><textarea name="address" rows="4" cols="30"></textarea></td>
            </tr>

            <tr align="center">
                <td colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
